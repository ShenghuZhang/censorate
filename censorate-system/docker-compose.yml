version: '3.8'

services:
  db:
    image: postgres:15
    container_name: stratos-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stratos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-stratos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stratos-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: censorate-hermes
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /opt/hermes/docker/entrypoint.sh echo init &
        sleep 3
        /opt/hermes/docker/entrypoint.sh gateway run
    ports:
      - "${HERMES_PORT:-8642}:8642"
    environment:
      HERMES_HOME: /opt/data
      GATEWAY_HTTP_PORT: 8642
      GATEWAY_ALLOW_ALL_USERS: ${HERMES_GATEWAY_ALLOW_ALL_USERS:-false}
      HERMES_DASHBOARD: ${HERMES_DASHBOARD:-1}
      API_SERVER_ENABLED: "true"
      API_SERVER_KEY: ${HERMES_API_SERVER_KEY:?set HERMES_API_SERVER_KEY in .env}
      API_SERVER_PORT: 8642
      API_SERVER_HOST: 0.0.0.0
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    volumes:
      - ./hermes_data:/opt/data

  skill-manager:
    image: python:3.11-slim
    container_name: censorate-skill-manager
    restart: unless-stopped
    volumes:
      - ./hermes_data:/opt/data
      - ./backend/scripts/skill_manager.py:/opt/skill_manager.py:ro
    environment:
      CENSORATE_URL: http://backend:8216/api/v1
      HERMES_API_SERVER_KEY: ${HERMES_API_SERVER_KEY}
    command: >
      sh -c "pip install httpx python-frontmatter >/dev/null 2>&1 &&
             echo '[SkillManager] Running initial sync...' &&
             python /opt/skill_manager.py --hermes-data /opt/data &&
             echo '[SkillManager] Starting daemon (sync every 1h)...' &&
             python /opt/skill_manager.py --daemon --interval 3600 --hermes-data /opt/data"
    depends_on:
      - backend

  minio:
    image: minio/minio
    container_name: stratos-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  backend:
    build: ./backend
    container_name: stratos-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-stratos}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-stratos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY in .env}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      LARK_APP_ID: ${LARK_APP_ID}
      LARK_APP_SECRET: ${LARK_APP_SECRET}
      DEBUG: ${DEBUG:-false}
      HERMES_DATA_PATH: /opt/data
    volumes:
      - ./backend:/app
      - ./hermes_data:/opt/data
    ports:
      - "8216:8216"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8216/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: stratos-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8216/api/v1}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:

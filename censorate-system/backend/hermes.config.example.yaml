model:
  default: deepseek-chat
  provider: deepseek
  base_url: https://api.deepseek.com/v1

toolsets:
  - hermes-cli

agent:
  max_turns: 90
  gateway_timeout: 1800
  api_max_retries: 3
  tool_use_enforcement: auto
  reasoning_effort: medium

terminal:
  backend: local
  cwd: .
  timeout: 180

display:
  compact: false
  language: zh-CN
  streaming: true

security:
  allow_private_urls: false
  redact_secrets: true
  tirith_enabled: true
  tirith_fail_open: false

approvals:
  mode: manual
  cron_mode: deny

# Keep secrets in hermes_data/.env only.
# Recommended variables:
#   DEEPSEEK_API_KEY=...
#   API_SERVER_KEY=...

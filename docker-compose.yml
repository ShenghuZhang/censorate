services:
  db:
    image: postgres:15
    container_name: censorate-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stratos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-stratos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: censorate-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./censorate-system/backend
    container_name: censorate-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-stratos}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-stratos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NOTIFICATION_REDIS_URL: ${NOTIFICATION_REDIS_URL:-redis://redis:6379/1}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY in .env}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-3-5-sonnet-20240620}
      GITHUB_ACCESS_TOKEN: ${GITHUB_ACCESS_TOKEN}
      GITHUB_USERNAME: ${GITHUB_USERNAME}
      DEBUG: ${DEBUG:-false}
    volumes:
      - ./censorate-system/backend:/app
    ports:
      - "8216:8216"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8216/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  frontend:
    build: ./censorate-system/frontend
    container_name: censorate-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8216/api/v1}
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

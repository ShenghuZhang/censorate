version: '3.8'

services:
  db:
    image: postgres:15
    container_name: stratos-db
    environment:
      POSTGRES_USER: stratos
      POSTGRES_PASSWORD: stratos123
      POSTGRES_DB: stratos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stratos -d stratos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stratos-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: stratos-backend
    environment:
      DATABASE_URL: postgresql://stratos:stratos123@db:5432/stratos
      REDIS_URL: redis://redis:6379
      JWT_SECRET_KEY: your-secret-key-here-change-in-production
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LARK_APP_ID: ${LARK_APP_ID}
      LARK_APP_SECRET: ${LARK_APP_SECRET}
      DEBUG: "true"
    volumes:
      - ./backend:/app
    ports:
      - "8216:8216"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8216/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: stratos-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8216/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
